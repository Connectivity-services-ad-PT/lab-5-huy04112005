services:
  team_db:
    image: postgres:15-alpine
    container_name: team_db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
      POSTGRES_DB: ${DB_NAME:-notification_db}
    ports:
      - "5432:5432"
    networks:
      - team-internal
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-notification_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  team_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team_api
    depends_on:
      team_db:
        condition: service_healthy
    environment:
      PORT: 8000
      NODE_ENV: production
      DB_HOST: team_db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASS: ${DB_PASS:-password}
      DB_NAME: ${DB_NAME:-notification_db}
    secrets:
      - bot_token
    ports:
      - "8000:8000"
    networks:
      - team-internal
      - class-net

volumes:
  db_data:

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

secrets:
  bot_token:
    file: ./secrets/bot_token.txt
