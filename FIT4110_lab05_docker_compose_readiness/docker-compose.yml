services:
  team_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-password}
      MYSQL_DATABASE: ${DB_NAME:-iot_db}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASS:-password}
    ports:
      - "3307:3306"
    networks:
      - team-internal
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  iot_app:
    image: team-iot:v0.1.0-team-iot
    build: .
    container_name: iot_app
    command: uvicorn src.iot_app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      team_db:
        condition: service_healthy
      ai_service:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=iot-ingestion
      - AUTH_TOKEN=${AUTH_TOKEN:-local-dev-token}
      - DB_HOST=team_db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-admin}
      - DB_PASS=${DB_PASS:-password}
      - DB_NAME=${DB_NAME:-iot_db}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai_service:8001}
    networks:
      - team-internal
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ai_service:
    image: team-ai:v0.1.0-team-ai
    build: .
    container_name: ai_service
    command: uvicorn src.ai_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=ai-service
    networks:
      - team-internal
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  team-internal:
    driver: bridge

volumes:
  db_data:
